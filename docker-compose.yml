services:
  mongo:
    image: mongo:5
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  auth:
    build:
      context: ./apps/auth
    container_name: auth
    ports:
      - "3001:3000"
    environment:
      MONGO_URI: mongodb://mongo:27017/buddy
    depends_on:
      - mongo

  shelves:
    build:
      context: ./apps/shelves
    container_name: shelves
    ports:
      - "3002:3000"
    environment:
      MONGO_URI: mongodb://mongo:27017/buddy
    depends_on:
      - mongo

  spaces:
    build:
      context: ./apps/spaces
    container_name: spaces
    ports:
      - "3003:3000"
    environment:
      MONGO_URI: mongodb://mongo:27017/buddy
    depends_on:
      - mongo

volumes:
  mongo-data:
